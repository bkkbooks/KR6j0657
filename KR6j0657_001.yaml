body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳法大師臣施護奉詔譯爾時世尊入三摩地名一切如來金剛安像三昧從三昧起說彼塑畫雕造莊嚴一切佛及諸賢聖之衆安像慶讚儀軌之法欲造佛像先得了知十種法則阿闍梨復須善知佛身一切圓滿之相及停分大小之量於息災增益等真言印法儀軌之事皆悉明了然得於彼寺舍殿塔之內造諸尊像若所造佛像儀相闕少不得安像慶讚若儀相不圓令彼衆生現世未來得大苦怖是故一心求造圓滿若圓滿已令前知法阿闍梨依真言儀軌請佛安像供養慶讚即得如來賢聖降臨隨喜成就功德若造像畢已經久時而不行安像慶讚於其後時反獲不吉設復有人供養禮拜終無福利如無智人人相不具令彼世間而生輕慢若阿闍梨請安佛像而不知法及闕少儀軌如酥入灰欲作護摩必無果報是故造像須具相圓滿令安像慶讚儀軌具足令諸有情得大福報爾時有一菩薩而白佛言世尊佛身無相猶若虛空遍一切處云何今說令安佛像佛言汝今諦聽我為久修行者說彼法身無相無為遍一切處猶在虛空本自寂然不生不滅云何安像今為初發心衆生令彼得福作如是說安像慶讚結淨之法欲建曼拏羅先揀吉星吉日於結界勝地清淨之處陳設傘蓋幢幡香華燈果然令阿闍梨依法儀軌一心召請先於結界地上下五色粉絣線作曼拏羅請五族如來及菩薩眷屬等須依此根本儀軌不得依別儀請召又阿闍梨入佛堂殿安像之時須手腕及指帶釧鐶等莊嚴於身阿闍梨并弟子一心觀想如來一切圓滿之相然後合掌作禮瞻仰聖賢以清淨香花香水燈果依法儀軌獻閼伽香燈獻已入定心離疑念誦此真言三遍三摩野薩怛鑁三摩野薩怛鑁誦此真言已而啓請言如一切佛安住覩史陀天亦如佛在摩邪夫人胎藏願佛慈悲住此亦然願佛恆住弟子某甲為發菩提心受此香花供養請佛像已復與施主弟子受戒所有供養儀則等一切須依阿闍梨言教不得怠慢令彼施主得大果報請召如來安住坐位以香華燈果飲食誦真言獻閼伽供養所有佛像面東安置用黃衣蓋覆阿闍梨作觀想想佛如一聚火誦此真言七遍擲白芥子唵薩哩嚩二合播引波娑普二合吒那賀曩嚩日囉二合引野薩嚩二合賀誦此真言已復想如來如真實身諸相圓滿然以唵阿吽三字安在像身三處用唵字安頂上用阿字安口上用吽字安心上若誦得本尊根本真言但安心上若請召印或金剛印或鉤印依法而作若人無力隨力令作所用器物或金銀寶玉銅石瓦器木器螺杯及樹葉皆得為閼伽供養若法中使銅器作閼伽最上如金石等佛像故暗塗香油在上用草刷子洗刷令淨然用歌讚妓樂令童女歌舞等復誦香油真言唵薩哩嚩二合怛他誐多迦野尾戍馱儞引娑嚩二合賀引若賢瓶用五或八以白檀香塗之種種香水滿彼瓶中而即加持復令童女合線染成五色上好新鮮纏瓶周回復用五寶五藥花果等入於賢瓶誦最勝佛頂真言或白傘蓋真言摋白芥子以為加持或念息災真言亦得若洗浴佛像先塗香油復用尼俱陀樹葉優曇樹葉為粖五穀五種淨水以銅器盛之洗浴佛像然令弟子一切衆人誦於偈讚及諸歌樂以為吉祥之音適悅尊像如灌頂儀則乃誦佛眼菩薩真言能除一切垢唵薩哩嚩二合囉祖引波賀囉拏娑嚩二合引賀引誦此真言已阿闍梨言如佛降生之時沐浴佛身一切如來亦復如是我今以清淨最上之水洗浴佛像復誦灌頂真言唵薩哩嚩二合怛他引誐哆引鼻詵引迦三摩野室哩二合曳引吽若是畫像功德以鏡照彼所畫功德用前五種淨水寫於鏡上沐浴鏡中影像若前金銀等像及所畫㡧像沐浴畢已即誦著衣真言唵嚩日囉二合嚩引娑細引娑嚩二合引賀次誦安耳真言唵迦囉拏二合摩路引馱囉拏吽次誦安髮髻真言唵薩哩嚩二合枳引娑阿嚩哆引囉拏吽娑嚩二合賀引次誦安指甲真言唵薩哩嚩二合輸曩佉砌那曩囉惹娑嚩二合賀次誦安髭鬚真言唵薩哩嚩二合娑摩二合酥嚕二合馱囉拏吽吽呬凌二合次誦獻塗香真言唵嚩日囉二合巘弟引娑嚩二合引賀引次誦安莊嚴真言唵嚩日囉二合婆囉拏尾部瑟尼娑嚩二合賀誦此真言已依灌頂儀入曼拏羅與佛像誦本尊三昧真言唵吽怛落仡哩惡誦此真言已如是戴冠面東安置佛像令彼施主得大福利次用香花等供養先誦獻花真言唵嚩日囉二合補瑟閉二合引吽誦此真言已白言此花最上或水中生或陸地生我今志心供養願佛納受次誦獻香真言唵嚩日囉二合度閉誦此真言已白言此香最上或自然香或和合香我今志心供養願佛納受次誦塗香真言唵嚩日囉二合巘弟引娑嚩二合賀誦此真言已白言此是塗香最上殊勝願佛納受次誦燈真言唵嚩日囉二合禰閉引娑嚩二合賀誦此真言已白言此是燈供養或酥燈或油燈光明破暗我今志心供養願佛納受消除一切愚暗次誦食真言唵賓努波引旦鉢囉二合底仡哩二合恨曩娑嚩二合賀誦此真言已白言此是食供養最上飲食色香美味一切具足我今志心供養願佛納受如是供養儀則既已周備復為佛像開眼之光明如點眼相似即誦開眼光真言二道唵作芻作芻三滿哆作芻尾戍馱儞引娑嚩賀唵儞引怛囉二合波吒路引波賀引囉拏呬凌二合次誦佛入定真言唵禰𭕺切身儞引曩三摩引地𭕟切身曩必哩二合拏儞娑嚩二合賀誦此真言已復令施主弟子入曼拏羅阿闍梨白言汝今請我安慶佛像我今為汝所作儀軌悉皆周畢宜應灌頂誦此真言三摩野薩怛鑁次作護摩或一千或五百或二百五十遍若護摩爐宜四方作用有白乳汁者濕柴入於爐內復用酥酪蜜及五穀合和用作護摩能與自身及一切弟子息災增益即誦作護摩真言唵嚩日囉二合喻世引娑嚩二合賀此是作護摩真言次誦增壽真言阿誐蹉賀哩賓誐羅禰鉢哆二合𡁠賀嚩二合路引呬哆引乞叉二合禰引呬那那引波野伊難左彌引迦哩焰二合俱嚕娑嚩二合賀此是增壽真言次誦息災增益真言唵嚩日囉二合布瑟吒二合曳娑嚩二合賀此是息災增益真言次為火天於護摩爐安置座位作其觀想觀護摩爐三分之中空其一分為火天座位唵酥鉢囉二合底瑟姹二合哆嚩日囉二合娑嚩二合賀此是安置火天真言次以香花等獻護世及伊舍那天即誦護世真言印捺囉二合野娑嚩二合賀誦此真言已作其妓樂歌舞等發遣白言上來廣作佛事供養多不如法所來梵天天子并諸天衆等為其施主依此儀軌於一切處作大息災增益往彼佛剎復有請召願賜降臨地水火風神等往本界中發善心愛敬所安佛像經百千劫護持施主及子孫眷屬並阿闍梨一切弟子普獲吉祥若作壇法吉時者正月二月三月四月五月十一月十二月若所用日於白月二日三日七日十日十三日十五日黑月亦得復須就吉星宿直日即可作法若翼星畢星斗星嘴星尾星心星鬼星箕星室星此是最上吉星求一切事皆得成就若井星得作法成就所求必遂兼得外來眷屬若尾星斗星嘴星得人敬愛及得財物若參星得息災若箕星得子孫長壽若室星恆得美事成就若鬼星得一切最勝若心星房星得快樂稱意若木星水星金星吉善第一若此三星和合直日作安像慶讚儀則得最上福若前第三第七第六第十及第十一星此五星若與月合同用大吉若第二第六第十及第十一星與水星合同用大吉若第二第七第九及第十一星與木星合同用作召請結淨最善大吉若第六第七第十星與金星合同用大吉若第一第三第五星能破財物阿闍梨應如是善知星辰之力如作法日若得星曜和順所作之事於剎那之頃必得成就若安像慶讚獲福最上當得轉輪王位大國王位無復疑惑又若星曜相順無一切障難所安佛像塔廟世世生生俱得成就人獲福利若造像工人及諸雜使之者俱與財帛善言慰安勿令失所方合儀法所有供養如來餘剩之食若人食者皆得滅罪阿闍梨即教化施主結緣增福施利所有金銀財帛象馬車乘隨力布施志心奉上令阿闍梨歡喜賢聖亦歡喜復於比丘比丘尼優婆塞優婆夷以其財食隨力供養令福圓滿於初夜分作大妓樂歌舞幡華螺鈸及施主眷屬圍繞恭敬曼拏羅內所有供養物色並須捨與阿闍梨不得別處破用亦不得別比丘處施與不合儀法壇法既畢即收壇物若五色粉送入河中用衢摩邪淨水洗拭壇地如法結淨功德成就
